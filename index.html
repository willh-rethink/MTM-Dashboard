<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTM Program Dashboard — Rethink Food</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Password gate ── */
    #gate {
      position: fixed; inset: 0;
      background: var(--black);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999;
    }
    .gate-box {
      background: var(--white);
      border-radius: 12px;
      padding: 40px 36px;
      width: 100%; max-width: 340px;
      text-align: center;
    }
    .gate-logo {
      width: 32px; height: 32px;
      background: var(--green);
      border-radius: 50%;
      margin: 0 auto 16px;
    }
    .gate-title { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
    .gate-sub { font-size: 13px; color: var(--gray); margin-bottom: 24px; }
    .gate-input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 12px;
    }
    .gate-input:focus { border-color: var(--green); }
    .gate-input.error { border-color: var(--red); }
    .gate-btn {
      width: 100%;
      padding: 11px;
      background: var(--green);
      color: var(--white);
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .gate-btn:hover { opacity: 0.88; }
    .gate-err { font-size: 13px; color: var(--red); margin-top: 10px; min-height: 18px; }

    :root {
      --green: #00A651;
      --green-light: #e6f7ee;
      --black: #111;
      --gray: #555;
      --border: #e0e0e0;
      --bg: #f8f8f8;
      --white: #fff;
      --yellow: #f5a623;
      --red: #d0021b;
      --radius: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--black);
      font-size: 15px;
      line-height: 1.5;
    }

    /* ── Header ── */
    header {
      background: var(--black);
      color: var(--white);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header .logo-dot {
      width: 22px; height: 22px;
      background: var(--green);
      border-radius: 50%;
      flex-shrink: 0;
    }
    header h1 {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    header .subtitle {
      font-size: 12px;
      color: #aaa;
      margin-left: auto;
    }

    /* ── Layout ── */
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    /* ── Filters ── */
    .filters {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 20px;
    }
    .filter-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }
    .filter-row:last-child { margin-bottom: 0; }
    .filter-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--gray);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      width: 52px;
      flex-shrink: 0;
    }
    .pill-group { display: flex; flex-wrap: wrap; gap: 6px; }
    .pill {
      padding: 4px 12px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--white);
      color: var(--gray);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .pill:hover { border-color: var(--green); color: var(--green); }
    .pill.active {
      background: var(--green);
      border-color: var(--green);
      color: var(--white);
      font-weight: 600;
    }

    /* ── Section headers ── */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--gray);
      margin-bottom: 12px;
      margin-top: 28px;
    }

    /* ── Snapshot box ── */
    .snapshot {
      background: var(--green);
      color: var(--white);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 8px;
    }
    .snapshot-header {
      font-size: 13px;
      font-weight: 600;
      opacity: 0.85;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .snapshot-active {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .snapshot-active span { font-size: 15px; font-weight: 400; opacity: 0.8; margin-left: 6px; }
    .snapshot-prior-label {
      font-size: 12px;
      opacity: 0.75;
      margin-bottom: 8px;
    }
    .snapshot-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
    }
    .snapshot-item {
      background: rgba(255,255,255,0.15);
      border-radius: 6px;
      padding: 10px 14px;
    }
    .snapshot-item-label {
      font-size: 11px;
      opacity: 0.8;
      margin-bottom: 4px;
    }
    .snapshot-item-vals {
      font-size: 13px;
      font-weight: 600;
    }
    .snapshot-item-vals .sep { opacity: 0.5; margin: 0 4px; }

    /* ── Metric cards ── */
    .cards-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
    }
    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 18px 14px;
    }
    .card.highlight { border-top: 3px solid var(--green); }
    .card-label {
      font-size: 12px;
      color: var(--gray);
      margin-bottom: 6px;
    }
    .card-value {
      font-size: 28px;
      font-weight: 700;
      line-height: 1.1;
    }
    .card-sub {
      font-size: 12px;
      color: var(--gray);
      margin-top: 4px;
    }
    .delta {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      margin-top: 6px;
    }
    .delta.up { background: #e6f7ee; color: #1a8a42; }
    .delta.down { background: #fde8eb; color: #b0001a; }
    .delta.neutral { background: #f0f0f0; color: var(--gray); }

    /* ── SCN Partner cards ── */
    .scn-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .scn-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
    }
    .scn-name {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .scn-count { font-size: 22px; font-weight: 700; }
    .scn-pct { font-size: 12px; color: var(--gray); margin-top: 2px; }
    .progress-bar {
      height: 5px;
      background: var(--border);
      border-radius: 3px;
      margin-top: 10px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--green);
      border-radius: 3px;
      transition: width 0.4s;
    }

    /* ── Deliveries table ── */
    .table-wrap {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead th {
      background: #f3f3f3;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--gray);
      padding: 10px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    thead th:not(:first-child) { text-align: right; }
    tbody td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody td:not(:first-child) { text-align: right; }
    tbody td:first-child { font-weight: 600; }
    .rate-chip {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }
    .rate-chip.green { background: #e6f7ee; color: #1a8a42; }
    .rate-chip.yellow { background: #fff8e6; color: #b07d00; }
    .rate-chip.red { background: #fde8eb; color: #b0001a; }
    .rate-chip.none { background: #f0f0f0; color: var(--gray); }

    /* ── Week-over-week ── */
    .wow-list {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .wow-row {
      display: flex;
      align-items: center;
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .wow-row:last-child { border-bottom: none; }
    .wow-label { font-size: 13px; font-weight: 600; width: 160px; flex-shrink: 0; }
    .wow-vals { font-size: 13px; color: var(--gray); flex: 1; }
    .wow-vals .arrow { margin: 0 6px; }
    .wow-vals .curr { color: var(--black); font-weight: 600; }

    /* ── Loading / error ── */
    #loading, #error {
      text-align: center;
      padding: 60px 20px;
      color: var(--gray);
      font-size: 15px;
    }
    #error { color: var(--red); }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .cards-row { grid-template-columns: 1fr 1fr; }
      .scn-row { grid-template-columns: 1fr; }
      .snapshot-grid { grid-template-columns: 1fr 1fr; }
      .wow-label { width: 130px; }
    }
  </style>
</head>
<body>

<div id="gate">
  <div class="gate-box">
    <div class="gate-logo"></div>
    <div class="gate-title">MTM Dashboard</div>
    <div class="gate-sub">Rethink Food — internal use only</div>
    <input id="gate-input" class="gate-input" type="password" placeholder="Password" autocomplete="current-password" />
    <button class="gate-btn" onclick="checkPassword()">Enter</button>
    <div class="gate-err" id="gate-err"></div>
  </div>
</div>

<header>
  <div class="logo-dot"></div>
  <h1>MTM Program Dashboard</h1>
  <span class="subtitle" id="last-updated"></span>
</header>

<main>
  <div id="loading">Loading data…</div>
  <div id="error" style="display:none"></div>
  <div id="dashboard" style="display:none">

    <!-- Filters -->
    <div class="filters">
      <div class="filter-row">
        <span class="filter-label">Week</span>
        <div class="pill-group" id="week-pills"></div>
      </div>
      <div class="filter-row">
        <span class="filter-label">SCN</span>
        <div class="pill-group" id="scn-pills">
          <button class="pill active" data-scn="All">All</button>
          <button class="pill" data-scn="PHS">PHS</button>
          <button class="pill" data-scn="SOMOS">SOMOS</button>
          <button class="pill" data-scn="HEALI">HEALI</button>
        </div>
      </div>
    </div>

    <!-- Snapshot -->
    <div class="snapshot" id="snapshot-box"></div>

    <!-- Members -->
    <div class="section-label">Members</div>
    <div class="cards-row" id="members-cards"></div>

    <!-- By SCN Partner -->
    <div id="scn-section">
      <div class="section-label">By SCN Partner</div>
      <div class="scn-row" id="scn-cards"></div>
    </div>

    <!-- Deliveries -->
    <div class="section-label">Deliveries — Scheduled vs. Actual</div>
    <div class="table-wrap">
      <table id="deliveries-table">
        <thead>
          <tr>
            <th></th>
            <th>Scheduled</th>
            <th>Actual</th>
            <th>Fulfillment Rate</th>
          </tr>
        </thead>
        <tbody id="deliveries-body"></tbody>
      </table>
    </div>

    <!-- Week-over-week -->
    <div class="section-label">Week-over-Week</div>
    <div class="wow-list" id="wow-list"></div>

  </div>
</main>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const PASSWORD = "rethink2026"; // Change this to whatever you'd like
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR_RhxDRTkfsFyTJBeBjCeBPZhZJCBy6r8zJSua37YEoi_MUfw6qyR6e81NrP74dIpzVpXpksObEE0W/pub?output=csv";
// ────────────────────────────────────────────────────────────────────────────

let allRows = [];
let selectedWeek = null;
let selectedSCN = "All";

// ── Data loading ─────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    const parsed = Papa.parse(text, {
      header: true,
      skipEmptyLines: true,
      // Name the first blank header "Week"; rename all other blank headers so
      // PapaParse doesn't overwrite the date with trailing empty columns.
      transformHeader: (header, index) => {
        if (header === '') return index === 0 ? 'Week' : `__col_${index}`;
        return header;
      }
    });
    // Drop rows without a valid YYYY-MM-DD week date or missing member data
    allRows = parsed.data
      .filter(row => /^\d{4}-\d{2}-\d{2}$/.test(row["Week"]) && Number(row["Active members"]) > 0)
      .sort((a, b) => new Date(b["Week"]) - new Date(a["Week"]));
    if (!allRows.length) throw new Error("No data rows found in CSV.");
    init();
  } catch (e) {
    document.getElementById("loading").style.display = "none";
    const el = document.getElementById("error");
    el.style.display = "";
    el.textContent = "Could not load data: " + e.message;
  }
}

function init() {
  document.getElementById("loading").style.display = "none";
  document.getElementById("dashboard").style.display = "";

  buildWeekPills();
  bindSCNPills();
  selectedWeek = allRows[0]["Week"];
  markActivePill("week-pills", selectedWeek);
  render();
}

// ── Filter pills ──────────────────────────────────────────────────────────────
function buildWeekPills() {
  const container = document.getElementById("week-pills");
  container.innerHTML = "";
  allRows.forEach((row, i) => {
    const btn = document.createElement("button");
    btn.className = "pill" + (i === 0 ? " active" : "");
    btn.dataset.week = row["Week"];
    btn.textContent = formatDate(row["Week"]);
    btn.addEventListener("click", () => {
      selectedWeek = row["Week"];
      markActivePill("week-pills", selectedWeek);
      render();
    });
    container.appendChild(btn);
  });
}

function bindSCNPills() {
  document.querySelectorAll("#scn-pills .pill").forEach(btn => {
    btn.addEventListener("click", () => {
      selectedSCN = btn.dataset.scn;
      document.querySelectorAll("#scn-pills .pill").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      render();
    });
  });
}

function markActivePill(containerId, value) {
  document.querySelectorAll(`#${containerId} .pill`).forEach(b => {
    b.classList.toggle("active", b.dataset.week === value);
  });
}

// ── Main render ───────────────────────────────────────────────────────────────
function render() {
  const idx = allRows.findIndex(r => r["Week"] === selectedWeek);
  const curr = allRows[idx];
  const prior = allRows[idx + 1] || null;
  const isMostRecent = idx === 0;

  document.getElementById("last-updated").textContent =
    "Week of " + formatDate(curr["Week"]);

  renderSnapshot(curr, prior, isMostRecent);
  renderMembers(curr, prior);
  renderSCN(curr);
  renderDeliveries(curr, prior, isMostRecent);
  renderWoW(curr, prior);

  document.getElementById("scn-section").style.display =
    selectedSCN === "All" ? "" : "none";
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function n(row, col) {
  const v = row ? row[col] : null;
  return v === "" || v === undefined || v === null ? null : Number(v);
}

function fmt(val) {
  if (val === null || val === undefined || isNaN(val)) return "—";
  return Number(val).toLocaleString();
}

function pct(part, total) {
  if (!total || !part) return "—";
  return Math.round((part / total) * 100) + "%";
}

function deltaChip(curr, prior) {
  if (curr === null || prior === null) return "";
  const diff = curr - prior;
  const cls = diff > 0 ? "up" : diff < 0 ? "down" : "neutral";
  const sign = diff > 0 ? "+" : "";
  return `<span class="delta ${cls}">${sign}${fmt(diff)}</span>`;
}

function rateChip(sched, actual) {
  if (actual === null || sched === null || sched === 0) return `<span class="rate-chip none">—</span>`;
  const r = actual / sched;
  const pctStr = Math.round(r * 100) + "%";
  const cls = r >= 0.95 ? "green" : r >= 0.90 ? "yellow" : "red";
  return `<span class="rate-chip ${cls}">${pctStr}</span>`;
}

function formatDate(dateStr) {
  if (!dateStr) return "";
  const d = new Date(dateStr + "T12:00:00");
  return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
}

function filteredVal(curr, colAll, colSCN) {
  if (selectedSCN === "All") return n(curr, colAll);
  return n(curr, colSCN);
}

// ── Snapshot ─────────────────────────────────────────────────────────────────
function renderSnapshot(curr, prior, isMostRecent) {
  const activeNow = n(curr, "Active members");
  // Prior week data lives in the *current* row's P/Q/R/S/T columns
  const priorLabel = prior ? formatDate(prior["Week"]) : null;

  const schedMeals   = n(curr, "Scheduled meals — prior week");
  const schedDrops   = n(curr, "Scheduled drops — prior week");
  const actMeals     = n(curr, "Actual meals — prior week");
  const actDrops     = n(curr, "Actual meal drops — prior week");
  const actGrocery   = n(curr, "Actual grocery bags drops — prior week");
  // Grocery scheduled for prior week comes from the prior row's current-week col
  const schedGrocery = prior ? n(prior, "Scheduled grocery bags - current week") : null;

  document.getElementById("snapshot-box").innerHTML = `
    <div class="snapshot-header">As of ${formatDate(curr["Week"])}</div>
    <div class="snapshot-active">${fmt(activeNow)} <span>Active MTM Members</span></div>
  `;
}

// ── Members ───────────────────────────────────────────────────────────────────
function renderMembers(curr, prior) {
  let totalActive, mtm, mtg, newEnroll;

  if (selectedSCN === "All") {
    totalActive = n(curr, "Active members");
    mtm = n(curr, "MTM members");
    mtg = n(curr, "MTG members");
    newEnroll = n(curr, "New enrollments this week");
  } else if (selectedSCN === "PHS") {
    totalActive = n(curr, "Active Members - PHS");
    mtm = n(curr, "MTM members - PHS");
    mtg = n(curr, "MTG members - PHS");
    newEnroll = null;
  } else if (selectedSCN === "SOMOS") {
    totalActive = n(curr, "Active Members - SOMOS");
    mtm = n(curr, "MTM members - SOMOS");
    mtg = n(curr, "MTG members - SOMOS");
    newEnroll = null;
  } else if (selectedSCN === "HEALI") {
    totalActive = n(curr, "Active Members - HEALI");
    mtm = null;
    mtg = null;
    newEnroll = null;
  }

  let priorTotal = null;
  if (prior) {
    if (selectedSCN === "All")   priorTotal = n(prior, "Active members");
    else if (selectedSCN === "PHS")   priorTotal = n(prior, "Active Members - PHS");
    else if (selectedSCN === "SOMOS") priorTotal = n(prior, "Active Members - SOMOS");
    else if (selectedSCN === "HEALI") priorTotal = n(prior, "Active Members - HEALI");
  }

  document.getElementById("members-cards").innerHTML = `
    <div class="card highlight">
      <div class="card-label">Total Active</div>
      <div class="card-value">${fmt(totalActive)}</div>
      <div>${deltaChip(totalActive, priorTotal)}</div>
    </div>
    <div class="card">
      <div class="card-label">MTM Members</div>
      <div class="card-value">${fmt(mtm)}</div>
      <div class="card-sub">${pct(mtm, totalActive)} of active</div>
    </div>
    <div class="card">
      <div class="card-label">MTG Members</div>
      <div class="card-value">${fmt(mtg)}</div>
      <div class="card-sub">${pct(mtg, totalActive)} of active</div>
    </div>
    <div class="card">
      <div class="card-label">New Enrollments</div>
      <div class="card-value">${fmt(newEnroll)}</div>
      <div class="card-sub">this week</div>
    </div>
  `;
}

// ── SCN Partner ───────────────────────────────────────────────────────────────
function renderSCN(curr) {
  const total = n(curr, "Active members") || 0;
  const partners = [
    { name: "PHS",   col: "Active Members - PHS" },
    { name: "SOMOS", col: "Active Members - SOMOS" },
    { name: "HEALI", col: "Active Members - HEALI" },
  ];
  document.getElementById("scn-cards").innerHTML = partners.map(p => {
    const val = n(curr, p.col) || 0;
    const pctVal = total ? Math.round((val / total) * 100) : 0;
    return `
      <div class="scn-card">
        <div class="scn-name">${p.name}</div>
        <div class="scn-count">${fmt(val)}</div>
        <div class="scn-pct">${pctVal}% of total</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pctVal}%"></div></div>
      </div>
    `;
  }).join("");
}

// ── Deliveries ────────────────────────────────────────────────────────────────
function renderDeliveries(curr, prior, isMostRecent) {
  // Prior week actuals always live in the *current* row's R/S/T columns.
  // Prior week scheduled lives in curr's P/Q cols (meals/drops) and prior row's col O (grocery).
  const hasPrior = !!prior;

  const rows = [
    {
      label: "Meals",
      sched: n(curr, "Scheduled meals — prior week"),
      actual: n(curr, "Actual meals — prior week"),
    },
    {
      label: "Grocery Bags",
      sched: hasPrior ? n(prior, "Scheduled grocery bags - current week") : null,
      actual: n(curr, "Actual grocery bags drops — prior week"),
    },
    {
      label: "Drops",
      sched: n(curr, "Scheduled drops — prior week"),
      actual: n(curr, "Actual meal drops — prior week"),
    },
  ];

  // Label the table header with the prior week date if available
  const priorWeekNote = hasPrior
    ? ` <span style="font-weight:400;text-transform:none;letter-spacing:0;color:#888;font-size:11px;">(week of ${formatDate(prior["Week"])})</span>`
    : "";
  document.querySelector("#deliveries-table thead tr th:first-child").innerHTML = `Prior Week${priorWeekNote}`;
  document.querySelector("#deliveries-table thead tr th:first-child").style.whiteSpace = "nowrap";

  document.getElementById("deliveries-body").innerHTML = rows.map(r => {
    const actualCell = hasPrior ? fmt(r.actual) : "—";
    const chipHtml = hasPrior ? rateChip(r.sched, r.actual) : `<span class="rate-chip none">—</span>`;
    return `
      <tr>
        <td>${r.label}</td>
        <td>${hasPrior ? fmt(r.sched) : "—"}</td>
        <td>${actualCell}</td>
        <td>${chipHtml}</td>
      </tr>
    `;
  }).join("");
}

// ── Week-over-week ────────────────────────────────────────────────────────────
function renderWoW(curr, prior) {
  const metrics = [
    {
      label: "Active Members",
      curr: n(curr, "Active members"),
      prior: prior ? n(prior, "Active members") : null,
    },
    {
      label: "Scheduled Meals",
      curr: n(curr, "Scheduled meals - current week"),
      prior: prior ? n(prior, "Scheduled meals — prior week") : null,
    },
    {
      label: "Scheduled Grocery",
      curr: n(curr, "Scheduled grocery bags - current week"),
      prior: prior ? n(prior, "Scheduled grocery bags - current week") : null,
    },
    {
      label: "Scheduled Drops",
      curr: n(curr, "Scheduled Meal Drops - current week"),
      prior: prior ? n(prior, "Scheduled drops — prior week") : null,
    },
  ];

  document.getElementById("wow-list").innerHTML = metrics.map(m => {
    const diff = (m.curr !== null && m.prior !== null) ? m.curr - m.prior : null;
    const cls = diff === null ? "neutral" : diff > 0 ? "up" : diff < 0 ? "down" : "neutral";
    const sign = diff !== null && diff > 0 ? "+" : "";
    const chipHtml = diff !== null
      ? `<span class="delta ${cls}">${sign}${fmt(diff)}</span>`
      : "";
    return `
      <div class="wow-row">
        <div class="wow-label">${m.label}</div>
        <div class="wow-vals">
          ${fmt(m.prior)} <span class="arrow">→</span> <span class="curr">${fmt(m.curr)}</span>
        </div>
        ${chipHtml}
      </div>
    `;
  }).join("");
}

// ── Password gate ────────────────────────────────────────────────────────────
function checkPassword() {
  const val = document.getElementById("gate-input").value;
  if (val === PASSWORD) {
    sessionStorage.setItem("mtm_auth", "1");
    document.getElementById("gate").style.display = "none";
    loadData();
  } else {
    const input = document.getElementById("gate-input");
    input.classList.add("error");
    document.getElementById("gate-err").textContent = "Incorrect password.";
    input.value = "";
    input.focus();
  }
}

document.getElementById("gate-input").addEventListener("keydown", e => {
  if (e.key === "Enter") checkPassword();
  document.getElementById("gate-input").classList.remove("error");
  document.getElementById("gate-err").textContent = "";
});

// ── Boot ─────────────────────────────────────────────────────────────────────
if (sessionStorage.getItem("mtm_auth") === "1") {
  document.getElementById("gate").style.display = "none";
  loadData();
} else {
  document.getElementById("gate-input").focus();
}
</script>
</body>
</html>
